<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixel target / goal icon -->
  <!-- Outer ring -->
  <rect x="4" y="1" width="8" height="2" fill="#EA580C"/>
  <rect x="2" y="3" width="2" height="2" fill="#EA580C"/>
  <rect x="12" y="3" width="2" height="2" fill="#EA580C"/>
  <rect x="1" y="5" width="2" height="6" fill="#EA580C"/>
  <rect x="13" y="5" width="2" height="6" fill="#EA580C"/>
  <rect x="2" y="11" width="2" height="2" fill="#EA580C"/>
  <rect x="12" y="11" width="2" height="2" fill="#EA580C"/>
  <rect x="4" y="13" width="8" height="2" fill="#EA580C"/>
  <!-- Middle ring -->
  <rect x="5" y="3" width="6" height="2" fill="#C2410C"/>
  <rect x="3" y="5" width="2" height="6" fill="#C2410C"/>
  <rect x="11" y="5" width="2" height="6" fill="#C2410C"/>
  <rect x="5" y="11" width="6" height="2" fill="#C2410C"/>
  <!-- Inner fill -->
  <rect x="5" y="5" width="6" height="6" fill="#431407"/>
  <!-- Bullseye -->
  <rect x="6" y="6" width="4" height="4" fill="#EA580C"/>
  <rect x="7" y="7" width="2" height="2" fill="#FDBA74"/>
  <!-- Arrow -->
  <rect x="12" y="0" width="2" height="2" fill="#FAFAFA" opacity="0.8"/>
  <rect x="14" y="0" width="2" height="2" fill="#FAFAFA" opacity="0.8"/>
  <rect x="14" y="2" width="2" height="2" fill="#FAFAFA" opacity="0.8"/>
  <rect x="10" y="2" width="4" height="2" fill="#FAFAFA" opacity="0.6"/>
  <rect x="12" y="4" width="2" height="2" fill="#FAFAFA" opacity="0.6"/>
</svg>
