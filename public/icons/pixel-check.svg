<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixel checkmark / task complete icon -->
  <!-- Background square -->
  <rect x="1" y="1" width="14" height="14" fill="#18181B"/>
  <rect x="2" y="2" width="12" height="12" fill="#09090B"/>
  <!-- Border -->
  <rect x="1" y="1" width="14" height="2" fill="#3F3F46"/>
  <rect x="1" y="13" width="14" height="2" fill="#3F3F46"/>
  <rect x="1" y="1" width="2" height="14" fill="#3F3F46"/>
  <rect x="13" y="1" width="2" height="14" fill="#3F3F46"/>
  <!-- Checkmark in orange -->
  <rect x="3" y="8" width="2" height="2" fill="#EA580C"/>
  <rect x="5" y="10" width="2" height="2" fill="#EA580C"/>
  <rect x="7" y="8" width="2" height="2" fill="#EA580C"/>
  <rect x="9" y="6" width="2" height="2" fill="#EA580C"/>
  <rect x="11" y="4" width="2" height="2" fill="#EA580C"/>
  <!-- Bright tip -->
  <rect x="5" y="12" width="2" height="2" fill="#FB923C"/>
  <rect x="11" y="3" width="2" height="2" fill="#FB923C"/>
</svg>
